<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<meta http-equiv="X-UA-Compatible" content="IE=edge" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Leaderboard</title>
		<link rel="stylesheet" href="css/leaderboard.css" />
		<link rel="stylesheet" href="css/global.css" />
		<script src="scripts/leaderboard.js" type="module"></script>
		<script src="scripts/global.js" type="module"></script>
		<script src="https://kit.fontawesome.com/811caf8c84.js" crossorigin="anonymous"></script>
	</head>
	<body>
		<header>
			<h3 id="logo"><a href="/">BGDL</a></h3>
			<nav>
				<ul id="nav_links">
					<li><a href="leaderboard.html">Leaderboard</a></li>
				</ul>
			</nav>
		</header>
		<section id="mainContainer">
			<div id="statsViewer">
				<h1>Leaderboard</h1>
				<div id="leaderboard">
					<div id="filters">
						<input
							id="player-search"
							placeholder="Search for player..."
							autocomplete="off"
						/>
						<select id="province-filter">
							<option value="">All</option>
						</select>
					</div>

					<ul id="players-list"></ul>
				</div>
			</div>
			<div id="userStats">
				<div id="player-name-icon">
					<img id="player-province"/>
					<h1 id="player-name">Player</h1>
					<img id="player-icon" />
				</div>

				<div id="top-stats">
					<div class="top-container">
						<h2>Rank:</h2>
						<p id="rank-text"></p>
					</div>
					<div class="top-container">
						<h2>Completions:</h2>
						<p id="completions-text"></p>
					</div>
					<div class="top-container">
						<h2>Hardest Demon:</h2>
						<p id="hardest-text"></p>
					</div>
					<div class="top-container">
						<h2>Points:</h2>
						<p id="points-text"></p>
					</div>
				</div>
				<div id="completions-container">
					<div class="completions-div" id="completions">
						<h2 class="completions-title">Completions</h2>
						<ul id="completions-list"></ul>
					</div>
				</div>
			</div>
		</section>
		<div id="edit-player-overlay" class="hide">
			<div id="edit-player-modal">
				<div id="edit-player-top">
					<h2>Edit Player</h2>
					<button id="edit-player-close" type="button" aria-label="Close">
						<i class="fa-solid fa-xmark"></i>
					</button>
				</div>
				<form id="edit-player-form">
					<label for="edit-player-name">Username</label>
					<input id="edit-player-name" maxlength="32" required />

					<label for="edit-player-image">Profile Picture (JPG, PNG, WEBP)</label>
					<input
						id="edit-player-image"
						type="file"
						accept=".jpg,.jpeg,.png,.webp,image/jpeg,image/png,image/webp"
					/>

					<label for="edit-player-province">Province</label>
					<select id="edit-player-province"></select>

					<p id="edit-player-hint">
						Changing username updates all of this player's records.
					</p>

					<div id="edit-player-actions">
						<button id="edit-player-cancel" type="button">Cancel</button>
						<button id="edit-player-save" type="submit">Save</button>
					</div>
				</form>
			</div>
		</div>
	</body>
</html>
